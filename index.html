<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>게임 점수 기여도 계산기</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: #fff;
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
    }

    .container {
        width: 100%;
        max-width: 420px;
        background: #111827;
        padding: 20px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
        font-size: 20px;
        text-align: center;
        margin-bottom: 20px;
    }

    label {
        font-size: 13px;
        margin-top: 10px;
        display: block;
        color: #cbd5e1;
    }

    input {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border-radius: 10px;
        border: none;
        outline: none;
        background: #1f2937;
        color: #fff;
        font-size: 14px;
    }

    button {
        width: 100%;
        margin-top: 15px;
        padding: 12px;
        background: #3b82f6;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        background: #2563eb;
    }

    .result {
        margin-top: 20px;
        background: #1f2937;
        padding: 15px;
        border-radius: 12px;
        font-size: 14px;
        line-height: 1.6;
    }

    .highlight {
        color: #60a5fa;
        font-weight: bold;
    }
</style>
</head>

<body>
<div class="container">

    <h1>🎮 게임 점수 기여도 계산기</h1>

    <label>목표 점수</label>
    <input type="number" id="target" value="470000">

    <label>내 추가 점수</label>
    <input type="number" id="mine" value="56.5" step="0.1">

    <label>다른 사람 추가 점수</label>
    <input type="number" id="other" value="45" step="0.1">

    <button onclick="calculate()">계산하기</button>

    <div class="result" id="result">
        결과가 여기에 표시됩니다.
    </div>

</div>

<script>
function calculate() {
    const target = parseFloat(document.getElementById("target").value);
    const mineAdd = parseFloat(document.getElementById("mine").value);
    const otherAdd = parseFloat(document.getElementById("other").value);

    // 기본 점수
    const base = 1000;

    // 1초당 점수
    const myPerSec = base + (mineAdd * 10);
    const otherPerSec = base + (otherAdd * 10);

    const totalPerSec = myPerSec + otherPerSec;

    // 기여도
    const myContribution = (myPerSec / totalPerSec) * 100;
    const otherContribution = (otherPerSec / totalPerSec) * 100;

    // 목표 점수 분배
    const myTarget = target * (myContribution / 100);
    const otherTarget = target * (otherContribution / 100);

    // 시간
    const timeSec = target / totalPerSec;

    document.getElementById("result").innerHTML = `
        ⏱ 예상 시간: <span class="highlight">${timeSec.toFixed(2)}초</span><br><br>

        📊 기여도<br>
        - 나: <span class="highlight">${myContribution.toFixed(2)}%</span><br>
        - 다른 사람: <span class="highlight">${otherContribution.toFixed(2)}%</span><br><br>

        🎯 내가 해야 할 점수: <span class="highlight">${myTarget.toFixed(0)}</span><br>
        🎯 상대가 해야 할 점수: <span class="highlight">${otherTarget.toFixed(0)}</span>
    `;
}
</script>

</body>
</html>
