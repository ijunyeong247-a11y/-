<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>레이드 계산기</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#313338;
    color:#f2f3f5;
    font-family:"gg sans","Noto Sans KR",sans-serif;
    display:flex;
    justify-content:center;
    padding:20px;
}

/* 🔐 잠금 */
.lock{
    position:fixed;
    inset:0;
    background:#000000dd;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
}

.lock-box{
    background:#2b2d31;
    padding:25px;
    border-radius:14px;
    width:280px;
    text-align:center;
    border:1px solid #111214;
}

.lock-box input{
    width:100%;
    margin-top:10px;
    padding:12px;
    border-radius:10px;
    border:none;
    background:#1e1f22;
    color:white;
}

.lock-box button{
    margin-top:10px;
    width:100%;
    background:#5865f2;
    color:white;
    border:none;
    padding:12px;
    border-radius:10px;
    font-weight:700;
    cursor:pointer;
}

/* 메인 */
.container{
    width:100%;
    max-width:560px;
    background:#2b2d31;
    border-radius:16px;
    padding:20px;
    border:1px solid #1e1f22;
}

.title{
    font-size:22px;
    font-weight:700;
    margin-bottom:20px;
}

/* 입력 */
.section{
    margin-bottom:15px;
}

.label{
    font-size:12px;
    color:#b5bac1;
    margin-bottom:6px;
}

input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    background:#1e1f22;
    color:white;
}

/* 플레이어 */
.player{
    display:flex;
    gap:8px;
    margin-bottom:8px;
}

.player input{
    flex:1;
}

/* 버튼 */
.btn-row{
    display:flex;
    gap:10px;
}

button{
    padding:12px;
    border:none;
    border-radius:10px;
    font-weight:700;
    cursor:pointer;
}

.add{
    flex:1;
    background:#3ba55c;
    color:white;
}

.calc{
    flex:1;
    background:#5865f2;
    color:white;
}

.remove{
    width:45px;
    background:#da373c;
    color:white;
}

/* 결과 */
.result{
    margin-top:20px;
    background:#1e1f22;
    padding:15px;
    border-radius:12px;
}

/* 카드 */
.summary{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.card{
    background:#2b2d31;
    padding:12px;
    border-radius:12px;
    margin-top:10px;
    border:1px solid #111214;
}

.highlight{
    color:#5865f2;
    font-weight:700;
}

</style>
</head>

<body>

<!-- 🔐 잠금화면 -->
<div id="lockScreen" class="lock">
    <div class="lock-box">

        <h2>🔐 잠금</h2>

        <input
            type="password"
            id="passwordInput"
            placeholder="비밀번호 입력"
        >

        <button onclick="checkPassword()">
            접속
        </button>

        <p id="lockMsg"></p>

    </div>
</div>

<!-- 메인 -->
<div class="container">

<div class="title">🎮 레이드 계산기</div>

<div class="section">
    <div class="label">보스 체력</div>
    <input type="number" id="target" value="470000">
</div>

<div class="section">
    <div class="label">기본 점수</div>
    <input type="number" id="base" value="1000">
</div>

<div class="section">
    <div class="label">플레이어</div>
    <div id="players"></div>
</div>

<div class="btn-row">
    <button class="add" onclick="addPlayer()">+ 추가</button>
    <button class="calc" onclick="calculate()">계산</button>
</div>

<div class="result" id="result">
결과 표시
</div>

</div>

<script>

const PASSWORD = "1919";
const playersDiv = document.getElementById("players");

/* 🔐 비번 */
function checkPassword(){

    const input =
        document.getElementById("passwordInput").value;

    if(input === PASSWORD){

        document.getElementById("lockScreen")
            .style.display = "none";

    }else{

        document.getElementById("lockMsg")
            .innerText = "비밀번호 틀림";

    }
}

/* 저장 */
function savePlayers(){

    const values = [];

    document.querySelectorAll(".player input")
    .forEach(i=>values.push(i.value));

    localStorage.setItem(
        "raid_players",
        JSON.stringify(values)
    );
}

/* 생성 */
function createPlayer(v=30){

    const div = document.createElement("div");
    div.className = "player";

    div.innerHTML = `
        <input type="number" value="${v}" onchange="savePlayers()">
        <button class="remove" onclick="removePlayer(this)">X</button>
    `;

    playersDiv.appendChild(div);
}

/* 불러오기 */
function loadPlayers(){

    const saved =
        JSON.parse(localStorage.getItem("raid_players"));

    if(saved?.length){

        saved.forEach(v=>createPlayer(v));

    }else{

        createPlayer(59.5);
        createPlayer(54);
        createPlayer(65.5);
        
    }
}

/* 추가 */
function addPlayer(){
    createPlayer(30);
    savePlayers();
}

/* 삭제 */
function removePlayer(btn){

    if(document.querySelectorAll(".player").length <= 1){
        return alert("최소 1명");
    }

    btn.parentElement.remove();
    savePlayers();
}

/* 계산 */
function calculate(){

    const target =
        parseFloat(document.getElementById("target").value)||0;

    const base =
        parseFloat(document.getElementById("base").value)||0;

    let list = [];

    document.querySelectorAll(".player input")
    .forEach(i=>{
        list.push(base + (parseFloat(i.value||0)*10));
    });

    const total = list.reduce((a,b)=>a+b,0);

    if(total <= 0) return;

    const time = target / total;
    const wave = Math.ceil(target / total) + 1;

    let html = `
        <div class="summary">
            <div class="card">
                ⏱ <span class="highlight">${time.toFixed(2)}초</span>
            </div>

            <div class="card">
                🌊 <span class="highlight">${wave} WAVE</span>
            </div>
        </div>
    `;

    list.forEach((v,i)=>{

        const per = (v/total)*100;

        html += `
        <div class="card">
            플레이어 ${i+1}<br>
            기여도: <span class="highlight">${per.toFixed(1)}%</span>
        </div>`;
    });

    document.getElementById("result").innerHTML = html;
}

/* 시작 */
loadPlayers();

</script>

</body>
</html>
